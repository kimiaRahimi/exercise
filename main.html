<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" description="kimia">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><b>Travel reservation form</b></p>
    <p><b><sup>*</sup>denotes mandotory</b></p>
    <form action="">
        <label for="fname">Full Name <sup>*</sup>:</label><br>
        <input type="text" name="fname"  id="fname" placeholder="Firstname lastname"><br>
        <label for="email">Email address <sup>*</sup>:</label><br>
        <input type="email" name="email"  id="email" placeholder="Email_Address"><br>
        <label for="tourpack">Select Tour Package <sup>*</sup>:</label><br>
        <input list="tour" name="tourpack"  id="tourpack" size="10">
        <datalist id="tour">
            <option value="Goa"></option>
            <option value="Maldives"></option>
            <option value="Bali"></option>
        </datalist><br>
        <label for="date">Arrival date <sup>*</sup>:</label><br>
        <input type="date" name="date"  id="date"><br>
        <label for="number">Number of persons <sup>*</sup>:</label><br>
        <input type="number" name="number"  id="number" placeholder="Unknown Type"><br>
        <label for="interest">What would you want avail? <sup>*</sup>:</label><br>
        <label for="Boarding">Boarding</label>
        <input type="checkbox" name="Borading" id="Borading"><br>
        <label for="Fooding">Fooding</label>
        <input type="checkbox" name="Fooding" id="Fooding"><br>
        <label for="Sightseeing">Sight seeing</label>
        <input type="checkbox" name="Sightseeing" id="Sightseeing"><br>
        <label for="discout">Discout coupon code <sup>*</sup>:</label><br>
        <input type="text" name="discout"  id="discout" placeholder="Unknown_Type"><br>
        <label for="condition">Terms and Conditions <sup>*</sup>:</label><br>
        <input type="radio" name="condition" id="condition">
        <label for="agree">I agree</label>
        <input type="radio" name="condition" id="condition">
        <label for="disagree">I disagree</label><br>
        <input type="button" value="Complete reservation">
     </form>

</body>
</html>
